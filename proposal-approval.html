<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCPS Proposal Approval</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --teal: #074d52;
      --teal-2: #0f766e;
      --ink: #14212b;
      --muted: #667085;
      --line: #d8e2e4;
      --bg: #f5f2e9;
      --card: #ffffff;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(20, 33, 43, 0.12);
      overflow: hidden;
    }
    .top {
      background: var(--teal);
      color: #fff;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .top img { width: 48px; height: 48px; object-fit: contain; background:#fff; border-radius:8px; }
    .top h1 { margin: 0; font-size: 20px; letter-spacing: .03em; text-transform: uppercase; }
    .body { padding: 24px; }
    .eyebrow { color: var(--muted); font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    h2 { margin: 8px 0 6px; font-size: 26px; }
    p { line-height: 1.55; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }
    .info {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfc;
    }
    .info b { display:block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing:.06em; margin-bottom:5px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
    button, a.btn {
      border: 1px solid var(--teal);
      border-radius: 8px;
      padding: 11px 15px;
      font-weight: 800;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }
    .primary { background: var(--teal); color:#fff; }
    .outline { background:#fff; color: var(--teal); }
    .danger { border-color: var(--danger); color: var(--danger); background:#fff; }
    textarea {
      width: 100%;
      min-height: 90px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      font: inherit;
      resize: vertical;
    }
    .msg {
      margin-top: 16px;
      border-radius: 8px;
      padding: 12px;
      background: #ecfdf3;
      color: #067647;
      display: none;
    }
    .msg.err { background:#fef3f2; color: var(--danger); }
    .muted { color: var(--muted); }
    @media (max-width: 640px) {
      body { padding: 12px; align-items: flex-start; }
      .grid { grid-template-columns: 1fr; }
      .actions button, .actions a { width: 100%; text-align:center; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <img src="/logo.png" alt="MCPS">
      <h1>Proposal Approval</h1>
    </div>
    <div class="body" id="app">
      <div class="eyebrow">Loading</div>
      <h2>Checking your proposal link...</h2>
      <p class="muted">This should only take a moment.</p>
    </div>
  </main>

  <script src="/js/lib/constants.js"></script>
  <script src="/js/lib/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token') || '';
    const initialResponse = params.get('response') || '';
    let approvalData = null;

    function money(v) {
      const n = Number(v || 0);
      return isNaN(n) ? '$0.00' : '$' + n.toFixed(2);
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderError(message) {
      document.getElementById('app').innerHTML = `
        <div class="eyebrow">Unable To Open</div>
        <h2>Proposal link unavailable</h2>
        <p class="muted">${esc(message || 'This approval link is invalid or expired.')}</p>
      `;
    }

    function renderProposal(data) {
      approvalData = data;
      const p = data.proposal || {};
      const a = data.approval || {};
      const responded = a.status && a.status !== 'SENT';
      document.getElementById('app').innerHTML = `
        <div class="eyebrow">Proposal ${esc(p.proposal_number || '')}</div>
        <h2>${esc(p.customer_name || 'Customer')}</h2>
        <p class="muted">${esc(p.service || 'Pool Service')} for ${esc(p.service_address || 'your property')}</p>
        <div class="grid">
          <div class="info"><b>Address</b>${esc([p.service_address, p.city_state_zip].filter(Boolean).join(', ')) || 'On file'}</div>
          <div class="info"><b>Total</b>${money(p.total)}</div>
          <div class="info"><b>Sales Tax</b>${money(p.sales_tax)}</div>
          <div class="info"><b>Status</b>${esc(a.status || p.status || 'SENT')}</div>
        </div>
        <a class="btn outline" href="${esc(p.proposal_pdf_url)}" target="_blank" rel="noopener">View Proposal PDF</a>
        ${responded ? `
          <div class="msg" style="display:block">This proposal response has already been recorded as ${esc(a.status)}.</div>
        ` : `
          <textarea id="note" placeholder="Optional note. Required if requesting changes or declining."></textarea>
          <div class="actions">
            <button class="primary" onclick="respondProposal('approve')">Approve Proposal</button>
            <button class="outline" onclick="respondProposal('changes_requested')">Request Changes</button>
            <button class="danger" onclick="respondProposal('decline')">Decline</button>
          </div>
          <div class="msg" id="msg"></div>
        `}
      `;
      if (initialResponse && !responded) {
        setTimeout(() => respondProposal(initialResponse), 250);
      }
    }

    async function loadApproval() {
      if (!token) { renderError('The approval token is missing.'); return; }
      try {
        const res = await api({ action: 'get_proposal_approval', token });
        if (!res.ok || res.expired) {
          renderError(res.error || 'This approval link is invalid or expired.');
          return;
        }
        renderProposal(res);
      } catch(e) {
        renderError('Network error. Please try again later.');
      }
    }

    async function respondProposal(response) {
      const msg = document.getElementById('msg');
      const note = document.getElementById('note') ? document.getElementById('note').value.trim() : '';
      if ((response === 'decline' || response === 'changes_requested') && !note) {
        if (msg) { msg.className = 'msg err'; msg.textContent = 'Please add a short note before sending this response.'; msg.style.display = 'block'; }
        return;
      }
      document.querySelectorAll('button').forEach(b => b.disabled = true);
      if (msg) { msg.className = 'msg'; msg.textContent = 'Sending your response...'; msg.style.display = 'block'; }
      try {
        const res = await api({ action: 'respond_to_proposal', token, response, note });
        if (!res.ok) {
          if (msg) { msg.className = 'msg err'; msg.textContent = res.error || 'Could not save your response.'; msg.style.display = 'block'; }
          document.querySelectorAll('button').forEach(b => b.disabled = false);
          return;
        }
        const text = res.status === 'APPROVED'
          ? (res.agreement_sent ? 'Approved. Your service agreement is on its way for signature.' : 'Approved. MCPS will follow up with your service agreement shortly.')
          : res.status === 'DECLINED'
            ? 'Thanks. Your decline response has been recorded.'
            : 'Thanks. Your requested changes have been sent to MCPS.';
        document.getElementById('app').innerHTML = `
          <div class="eyebrow">Response Recorded</div>
          <h2>${esc(text)}</h2>
          <p class="muted">You can close this page.</p>
        `;
      } catch(e) {
        if (msg) { msg.className = 'msg err'; msg.textContent = 'Network error. Please try again.'; msg.style.display = 'block'; }
        document.querySelectorAll('button').forEach(b => b.disabled = false);
      }
    }

    loadApproval();
  </script>
</body>
</html>
