<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCPS — Profit Margins</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:       #0d4d44;
  --teal-mid:   #1a7a6e;
  --teal-light: #2aa89a;
  --teal-glow:  rgba(42,168,154,0.12);
  --gold:       #c8a84b;
  --gold-light: #e8c96a;
  --red:        #e05252;
  --red-light:  #fef2f2;
  --green:      #16a34a;
  --green-light:#f0fdf4;
  --warn:       #d97706;
  --warn-light: #fffbeb;
  --bg:         #0a0f0e;
  --surface:    #111918;
  --surface2:   #182421;
  --surface3:   #1e2e2b;
  --border:     rgba(42,168,154,0.15);
  --border2:    rgba(42,168,154,0.08);
  --text:       #e8f5f3;
  --text2:      #8ab5b0;
  --text3:      #4d7874;
  --radius:     12px;
  --radius-lg:  20px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-weight: 400;
  min-height: 100vh;
}

/* ── Topbar ─────────────────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.topbar-brand .logo-shield {
  width: 36px;
  height: 36px;
  background: var(--teal-mid);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.topbar-brand .logo-shield span {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.05em;
}

.topbar-title {
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text);
}

.topbar-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.topbar-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.toggle-pill {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 0.35rem 0.75rem;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: all 0.2s;
  user-select: none;
}

.toggle-pill input { display: none; }

.toggle-pill.active {
  background: var(--teal-glow);
  border-color: var(--teal-light);
  color: var(--teal-light);
}

.period-tabs {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 3px;
  gap: 2px;
}

.period-tab {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.3rem 0.9rem;
  border-radius: 99px;
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.2s;
}

.period-tab.active {
  background: var(--teal-mid);
  color: #fff;
}

.btn-refresh {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 1rem;
  background: var(--teal);
  border: 1px solid var(--teal-light);
  border-radius: 99px;
  color: var(--teal-light);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-refresh:hover { background: var(--teal-mid); color: #fff; }
.btn-refresh svg { width: 14px; height: 14px; }

/* ── Main layout ─────────────────────────────────────────────────────────── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem 1.25rem 4rem;
}

/* ── Loading / Error states ─────────────────────────────────────────────── */
.state-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 1rem;
  text-align: center;
}

.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--teal-light);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.state-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
}

/* ── KPI summary row ─────────────────────────────────────────────────────── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}

.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--teal-mid);
}

.kpi-card.gold::before  { background: var(--gold); }
.kpi-card.green::before { background: var(--green); }
.kpi-card.red::before   { background: var(--red); }

.kpi-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 0.5rem;
}

.kpi-value {
  font-family: 'Oswald', sans-serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.01em;
}

.kpi-sub {
  font-size: 0.78rem;
  color: var(--text3);
  margin-top: 0.3rem;
}

.kpi-projected-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(200,168,75,0.15);
  color: var(--gold);
  border-radius: 4px;
  padding: 1px 6px;
  margin-left: 6px;
  vertical-align: middle;
}

/* ── Section headers ─────────────────────────────────────────────────────── */
.section-header {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  margin: 2rem 0 1rem;
}

.section-title {
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
}

.section-count {
  font-size: 0.78rem;
  color: var(--text3);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.06em;
}

/* ── Charts row ──────────────────────────────────────────────────────────── */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

@media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  animation: fadeUp 0.4s ease both;
}

.chart-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}

.chart-wrap { position: relative; height: 200px; }

/* ── Top / Bottom pools ──────────────────────────────────────────────────── */
.mini-pools-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

@media (max-width: 700px) { .mini-pools-row { grid-template-columns: 1fr; } }

.mini-pool-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
}

.mini-pool-list { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.75rem; }

.mini-pool-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
}

.mini-pool-name {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.margin-bar-wrap {
  width: 80px;
  height: 6px;
  background: var(--surface3);
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
}

.margin-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.margin-chip {
  font-family: 'Oswald', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  min-width: 44px;
  text-align: right;
  flex-shrink: 0;
}

/* ── Pool table ──────────────────────────────────────────────────────────── */
.pool-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}

.pool-table-toolbar {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border2);
  flex-wrap: wrap;
}

.search-input {
  flex: 1;
  min-width: 160px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.45rem 0.85rem;
  font-family: 'Barlow', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--teal-light); }

.sort-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.45rem 0.85rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--text2);
  outline: none;
  cursor: pointer;
}

.pool-table { width: 100%; border-collapse: collapse; }

.pool-table th {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 0.6rem 1rem;
  text-align: left;
  border-bottom: 1px solid var(--border2);
  background: var(--surface2);
  white-space: nowrap;
}

.pool-table td {
  padding: 0.85rem 1rem;
  border-bottom: 1px solid var(--border2);
  font-size: 0.88rem;
  vertical-align: middle;
}

.pool-table tr:last-child td { border-bottom: none; }

.pool-table tbody tr {
  cursor: pointer;
  transition: background 0.15s;
}

.pool-table tbody tr:hover { background: var(--surface2); }

.pool-id-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--teal-light);
  background: var(--teal-glow);
  border-radius: 5px;
  padding: 2px 7px;
  white-space: nowrap;
}

.client-name { font-weight: 500; color: var(--text); }
.client-addr { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }

.service-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 5px;
  white-space: nowrap;
}

.service-tag.weekly    { background: rgba(42,168,154,0.12); color: var(--teal-light); }
.service-tag.biweekly  { background: rgba(200,168,75,0.12); color: var(--gold); }
.service-tag.other     { background: var(--surface3); color: var(--text3); }

.margin-cell {
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 500;
}

.no-data-cell {
  color: var(--text3);
  font-size: 0.78rem;
  font-style: italic;
}

/* ── Pool detail drawer ───────────────────────────────────────────────────── */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  animation: fadein 0.2s;
}

.drawer-backdrop.open { display: block; }

@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

.drawer {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: min(480px, 100vw);
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 201;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  padding: 1.5rem;
}

.drawer.open { transform: translateX(0); }

.drawer-close {
  position: absolute;
  top: 1rem; right: 1rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text3);
  font-size: 1rem;
  transition: all 0.15s;
}

.drawer-close:hover { color: var(--text); border-color: var(--teal-light); }

.drawer-pool-id {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--teal-light);
  text-transform: uppercase;
  margin-bottom: 0.25rem;
}

.drawer-client-name {
  font-family: 'Oswald', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
  margin-bottom: 0.25rem;
}

.drawer-addr {
  font-size: 0.82rem;
  color: var(--text3);
  margin-bottom: 1.25rem;
}

.drawer-stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.drawer-stat {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 0.85rem;
  text-align: center;
}

.drawer-stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.67rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 0.3rem;
}

.drawer-stat-value {
  font-family: 'Oswald', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--text);
}

.drawer-section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin: 1.25rem 0 0.75rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border2);
}

.drawer-month-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--border2);
  gap: 0.5rem;
}

.drawer-month-key {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text2);
  flex: 1;
}

.drawer-month-visits {
  font-size: 0.75rem;
  color: var(--text3);
  min-width: 60px;
  text-align: center;
}

.drawer-month-margin {
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  min-width: 52px;
  text-align: right;
}

.proj-label {
  font-size: 0.65rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(200,168,75,0.15);
  color: var(--gold);
  border-radius: 3px;
  padding: 0 5px;
  margin-left: 4px;
}

.drawer-chart-wrap { position: relative; height: 160px; margin-top: 0.5rem; }

/* ── Utilities ───────────────────────────────────────────────────────────── */
.good  { color: var(--green); }
.warn  { color: var(--warn); }
.bad   { color: var(--red); }
.muted { color: var(--text3); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.10s; }
.stagger-3 { animation-delay: 0.15s; }
.stagger-4 { animation-delay: 0.20s; }
.stagger-5 { animation-delay: 0.25s; }

.ts-badge {
  font-size: 0.72rem;
  color: var(--text3);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.05em;
}

@media (max-width: 600px) {
  .topbar { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  .pool-table th:nth-child(4), .pool-table td:nth-child(4) { display: none; }
  .pool-table th:nth-child(5), .pool-table td:nth-child(5) { display: none; }
  .kpi-value { font-size: 1.6rem; }
}
</style>
</head>
<body>

<!-- ── Topbar ──────────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="logo-shield"><span>MC</span></div>
    <div>
      <div class="topbar-title">Profit Margins</div>
      <div class="topbar-sub">Mission Custom Pool Solutions</div>
    </div>
  </div>
  <div class="topbar-controls">
    <label class="toggle-pill" id="labor-toggle" title="Add $15/visit labor cost">
      <input type="checkbox" id="labor-check" onchange="onLaborToggle()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Labor ($15)
    </label>
    <div class="period-tabs">
      <button class="period-tab active" data-period="month" onclick="setPeriod('month')">Monthly</button>
      <button class="period-tab" data-period="week" onclick="setPeriod('week')">Weekly</button>
      <button class="period-tab" data-period="lifetime" onclick="setPeriod('lifetime')">Lifetime</button>
    </div>
    <button class="btn-refresh" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/></svg>
      Refresh
    </button>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main class="main">

  <!-- Loading -->
  <div class="state-overlay" id="loading-state">
    <div class="spinner"></div>
    <div class="state-label">Loading margin data...</div>
  </div>

  <!-- Error -->
  <div class="state-overlay" id="error-state" style="display:none">
    <div style="font-size:2rem;">⚠️</div>
    <div class="state-label" id="error-msg">Failed to load data.</div>
    <button class="btn-refresh" onclick="loadData()" style="margin-top:0.5rem;">Retry</button>
  </div>

  <!-- Dashboard content -->
  <div id="dashboard" style="display:none">

    <!-- KPI row -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="chart-card stagger-1">
        <div class="chart-title">Monthly Revenue vs COGS</div>
        <div class="chart-wrap"><canvas id="rev-chart"></canvas></div>
      </div>
      <div class="chart-card stagger-2">
        <div class="chart-title">Margin % — All Pools This Month</div>
        <div class="chart-wrap"><canvas id="margin-dist-chart"></canvas></div>
      </div>
    </div>

    <!-- Top / Drain pools -->
    <div class="mini-pools-row">
      <div class="mini-pool-card">
        <div class="chart-title">Top Margin Pools</div>
        <div class="mini-pool-list" id="top-pools-list"></div>
      </div>
      <div class="mini-pool-card">
        <div class="chart-title">Pools Needing Attention</div>
        <div class="mini-pool-list" id="drain-pools-list"></div>
      </div>
    </div>

    <!-- Pool table -->
    <div class="section-header">
      <span class="section-title">All Pools</span>
      <span class="section-count" id="pool-count-label"></span>
      <span class="ts-badge" id="refresh-ts"></span>
    </div>

    <div class="pool-table-wrap">
      <div class="pool-table-toolbar">
        <input class="search-input" type="text" placeholder="Search by name, pool ID, address…" id="search-input" oninput="renderTable()">
        <select class="sort-select" id="sort-select" onchange="renderTable()">
          <option value="margin-desc">Margin ↓</option>
          <option value="margin-asc">Margin ↑</option>
          <option value="revenue-desc">Revenue ↓</option>
          <option value="name-asc">Name A→Z</option>
          <option value="visits-desc">Most Visits</option>
        </select>
      </div>
      <div style="overflow-x:auto">
        <table class="pool-table">
          <thead>
            <tr>
              <th>Pool</th>
              <th>Client</th>
              <th>Service</th>
              <th>Revenue/Visit</th>
              <th>Avg Chem/Visit</th>
              <th>Visits</th>
              <th>Margin</th>
              <th>Profit</th>
            </tr>
          </thead>
          <tbody id="pool-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<!-- ── Drawer ──────────────────────────────────────────────────────────────── -->
<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div id="drawer-content"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcCh5WVhiCZglMFQ_BaHHRD_QbsOFzpf5KgKyFWReAv7aJp2Z6_oYIUYBMLwzTIy_v/exec';

// ── State ─────────────────────────────────────────────────────────────────────
let _data        = null;
let _period      = 'month';
let _includeLabor = false;
let _revChart    = null;
let _distChart   = null;

// ── Boot ──────────────────────────────────────────────────────────────────────
window.onload = loadData;

async function loadData() {
  showState('loading');
  try {
    const url = `${APPS_SCRIPT_URL}?action=margins_data&labor=${_includeLabor}`;
    const res  = await fetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Server error');
    _data = json;
    render();
    showState('dashboard');
  } catch(e) {
    document.getElementById('error-msg').textContent = e.message || 'Failed to load data.';
    showState('error');
  }
}

function showState(state) {
  document.getElementById('loading-state').style.display  = state === 'loading'   ? 'flex'  : 'none';
  document.getElementById('error-state').style.display    = state === 'error'     ? 'flex'  : 'none';
  document.getElementById('dashboard').style.display      = state === 'dashboard' ? 'block' : 'none';
}

// ── Controls ──────────────────────────────────────────────────────────────────
function setPeriod(p) {
  _period = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.toggle('active', t.dataset.period === p));
  if (_data) render();
}

function onLaborToggle() {
  _includeLabor = document.getElementById('labor-check').checked;
  document.getElementById('labor-toggle').classList.toggle('active', _includeLabor);
  loadData(); // reload with new labor flag
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  if (!_data) return;
  renderKPIs();
  renderCharts();
  renderMiniLists();
  renderTable();
  document.getElementById('refresh-ts').textContent =
    'Updated ' + new Date(_data.generated_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

// ── KPI row ───────────────────────────────────────────────────────────────────
function renderKPIs() {
  const s = _data.summary;
  const margin = s.projected_margin;

  const cards = [
    {
      label : 'Projected Revenue',
      value : '$' + fmt(s.projected_revenue),
      sub   : `${s.total_active_pools} pools with data`,
      accent: '',
      badge : 'projected',
    },
    {
      label : 'Projected Profit',
      value : '$' + fmt(s.projected_profit),
      sub   : `COGS $${fmt(s.projected_cogs)}`,
      accent: s.projected_profit >= 0 ? 'green' : 'red',
      badge : 'projected',
    },
    {
      label : 'Business Margin',
      value : margin.toFixed(1) + '%',
      sub   : marginLabel(margin),
      accent: marginAccent(margin),
      badge : 'projected',
    },
    {
      label : 'Signed Pools',
      value : s.total_signed_pools,
      sub   : `${s.total_active_pools} have chem data`,
      accent: 'gold',
      badge : '',
    },
  ];

  document.getElementById('kpi-row').innerHTML = cards.map((c, i) => `
    <div class="kpi-card ${c.accent} stagger-${i+1}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}${c.badge ? `<span class="kpi-projected-badge">${c.badge}</span>` : ''}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>
  `).join('');
}

// ── Charts ────────────────────────────────────────────────────────────────────
function renderCharts() {
  renderRevChart();
  renderDistChart();
}

function renderRevChart() {
  // Aggregate monthly revenue / cogs across all pools
  const monthTotals = {};
  (_data.pools || []).forEach(pool => {
    (pool.monthly || []).forEach(m => {
      if (!monthTotals[m.monthKey]) monthTotals[m.monthKey] = { rev: 0, cogs: 0 };
      monthTotals[m.monthKey].rev  += m.actual_revenue;
      monthTotals[m.monthKey].cogs += m.actual_cogs;
    });
  });

  const months = Object.keys(monthTotals).sort();
  const revs   = months.map(m => monthTotals[m].rev);
  const cogss  = months.map(m => monthTotals[m].cogs);

  const ctx = document.getElementById('rev-chart').getContext('2d');
  if (_revChart) _revChart.destroy();

  _revChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.map(m => {
        const [y, mo] = m.split('-');
        return new Date(+y, +mo-1, 1).toLocaleString('default', { month: 'short', year: '2-digit' });
      }),
      datasets: [
        {
          label: 'Revenue',
          data: revs,
          backgroundColor: 'rgba(42,168,154,0.7)',
          borderRadius: 4,
        },
        {
          label: 'COGS',
          data: cogss,
          backgroundColor: 'rgba(200,168,75,0.5)',
          borderRadius: 4,
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8ab5b0', font: { family: 'Barlow Condensed', size: 11 } } } },
      scales: {
        x: { ticks: { color: '#4d7874', font: { family: 'Barlow Condensed', size: 10 } }, grid: { color: 'rgba(42,168,154,0.05)' } },
        y: { ticks: { color: '#4d7874', font: { family: 'Barlow Condensed', size: 10 }, callback: v => '$' + v.toFixed(0) }, grid: { color: 'rgba(42,168,154,0.07)' } },
      },
    },
  });
}

function renderDistChart() {
  // Margin distribution across pools this month
  const pools = (_data.pools || []).filter(p => p.has_chem_data);
  const cm    = _data.current_month;

  const marginBuckets = { '<0%': 0, '0–25%': 0, '25–50%': 0, '50–70%': 0, '>70%': 0 };

  pools.forEach(pool => {
    const m = (pool.monthly || []).find(m => m.monthKey === cm);
    if (!m) return;
    const mg = m.projected_margin;
    if      (mg < 0)  marginBuckets['<0%']++;
    else if (mg < 25) marginBuckets['0–25%']++;
    else if (mg < 50) marginBuckets['25–50%']++;
    else if (mg < 70) marginBuckets['50–70%']++;
    else              marginBuckets['>70%']++;
  });

  const ctx = document.getElementById('margin-dist-chart').getContext('2d');
  if (_distChart) _distChart.destroy();

  _distChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(marginBuckets),
      datasets: [{
        data: Object.values(marginBuckets),
        backgroundColor: ['#e05252','#d97706','#c8a84b','#1a7a6e','#2aa89a'],
        borderWidth: 0,
        hoverOffset: 6,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '68%',
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#8ab5b0', font: { family: 'Barlow Condensed', size: 11 }, padding: 10, boxWidth: 12 },
        },
      },
    },
  });
}

// ── Mini pool lists ────────────────────────────────────────────────────────────
function renderMiniLists() {
  const top   = _data.summary.top_margin_pools  || [];
  const drain = _data.summary.drain_pools        || [];

  document.getElementById('top-pools-list').innerHTML   = miniPoolItems(top,   'good');
  document.getElementById('drain-pools-list').innerHTML = miniPoolItems(drain, 'bad');
}

function miniPoolItems(pools, colorClass) {
  if (!pools.length) return '<div class="muted" style="font-size:.82rem;padding:.5rem 0">No data yet</div>';
  return pools.map(p => {
    const mg = p.margin || 0;
    const fillPct = Math.max(0, Math.min(100, mg));
    const fillColor = mg >= 50 ? '#2aa89a' : mg >= 25 ? '#c8a84b' : '#e05252';
    return `
      <div class="mini-pool-item">
        <div class="mini-pool-name">${p.client_name || p.pool_id}</div>
        <div class="margin-bar-wrap">
          <div class="margin-bar-fill" style="width:${fillPct}%;background:${fillColor}"></div>
        </div>
        <div class="margin-chip ${colorClass}">${mg.toFixed(1)}%</div>
      </div>`;
  }).join('');
}

// ── Pool table ────────────────────────────────────────────────────────────────
function renderTable() {
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const sort   = document.getElementById('sort-select').value;
  const cm     = _data.current_month;
  const cw     = _data.current_week;

  let pools = (_data.pools || []).filter(p => {
    const q = search;
    if (!q) return true;
    return (p.pool_id + p.client_name + p.address + p.service).toLowerCase().includes(q);
  });

  // Compute display margin/profit per pool based on period
  pools = pools.map(p => {
    let displayMargin = null, displayProfit = null, displayRevenue = p.revenue_per_visit;
    let isProjected = false;

    if (_period === 'month') {
      const m = (p.monthly || []).find(m => m.monthKey === cm);
      if (m) {
        displayMargin  = m.projected_margin;
        displayProfit  = m.projected_profit;
        displayRevenue = m.projected_revenue;
        isProjected    = m.is_projected;
      }
    } else if (_period === 'week') {
      const w = (p.weekly || []).find(w => w.weekKey === cw);
      if (w) {
        displayMargin  = w.margin;
        displayProfit  = w.profit;
        displayRevenue = w.revenue;
      }
    } else { // lifetime
      displayMargin  = p.lifetime_margin;
      displayProfit  = p.lifetime_profit;
    }

    return { ...p, displayMargin, displayProfit, displayRevenue, isProjected };
  });

  // Sort
  pools.sort((a, b) => {
    if (sort === 'margin-desc')   return (b.displayMargin ?? -999) - (a.displayMargin ?? -999);
    if (sort === 'margin-asc')    return (a.displayMargin ?? 999)  - (b.displayMargin ?? 999);
    if (sort === 'revenue-desc')  return (b.displayRevenue ?? 0)   - (a.displayRevenue ?? 0);
    if (sort === 'name-asc')      return (a.client_name || '').localeCompare(b.client_name || '');
    if (sort === 'visits-desc')   return b.total_visits - a.total_visits;
    return 0;
  });

  document.getElementById('pool-count-label').textContent = `${pools.length} pools`;

  const svcTag = (s) => {
    const sl = (s || '').toLowerCase();
    if (sl.includes('bi-weekly') || sl.includes('biweekly')) return `<span class="service-tag biweekly">Bi-Weekly</span>`;
    if (sl.includes('weekly')) return `<span class="service-tag weekly">Weekly</span>`;
    if (sl.includes('startup')) return `<span class="service-tag other">Startup</span>`;
    return `<span class="service-tag other">${s || '—'}</span>`;
  };

  document.getElementById('pool-tbody').innerHTML = pools.map(p => {
    const mg = p.displayMargin;
    const mgStr = mg !== null ? mg.toFixed(1) + '%' : '<span class="no-data-cell">No data</span>';
    const mgClass = mg !== null ? marginAccent(mg) : 'muted';
    const projBadge = p.isProjected && _period === 'month' ? '<span class="proj-label">proj</span>' : '';

    return `
      <tr onclick="openDrawer('${p.pool_id}')">
        <td><span class="pool-id-badge">${p.pool_id}</span></td>
        <td>
          <div class="client-name">${p.client_name || '—'}</div>
          <div class="client-addr">${(p.address || '').split(',').slice(0,2).join(',')}</div>
        </td>
        <td>${svcTag(p.service)}</td>
        <td>$${(p.revenue_per_visit || 0).toFixed(0)}</td>
        <td>${p.has_chem_data ? '$' + (p.avg_chem_per_visit || 0).toFixed(2) : '<span class="no-data-cell">—</span>'}</td>
        <td>${p.total_visits}</td>
        <td><span class="margin-cell ${mgClass}">${mgStr}${projBadge}</span></td>
        <td>${p.displayProfit !== null ? '<span class="' + mgClass + '">$' + fmt(p.displayProfit) + '</span>' : '<span class="no-data-cell">—</span>'}</td>
      </tr>`;
  }).join('');
}

// ── Drawer ────────────────────────────────────────────────────────────────────
function openDrawer(poolId) {
  const pool = (_data.pools || []).find(p => p.pool_id === poolId);
  if (!pool) return;

  const cm = _data.current_month;

  const monthly = (pool.monthly || []).slice().reverse(); // newest first

  const currentM = monthly.find(m => m.monthKey === cm);
  const displayMargin = currentM ? currentM.projected_margin : pool.lifetime_margin;
  const displayProfit = currentM ? currentM.projected_profit : pool.lifetime_profit;

  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-pool-id">${pool.pool_id}</div>
    <div class="drawer-client-name">${pool.client_name || '—'}</div>
    <div class="drawer-addr">${pool.address || ''}</div>

    <div class="drawer-stats-row">
      <div class="drawer-stat">
        <div class="drawer-stat-label">Revenue/Visit</div>
        <div class="drawer-stat-value">$${(pool.revenue_per_visit || 0).toFixed(0)}</div>
      </div>
      <div class="drawer-stat">
        <div class="drawer-stat-label">Avg Chem/Visit</div>
        <div class="drawer-stat-value">${pool.has_chem_data ? '$' + (pool.avg_chem_per_visit || 0).toFixed(2) : '—'}</div>
      </div>
      <div class="drawer-stat">
        <div class="drawer-stat-label">Total Visits</div>
        <div class="drawer-stat-value">${pool.total_visits}</div>
      </div>
    </div>

    <div class="drawer-stat" style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:.85rem;text-align:center;margin-bottom:.75rem">
      <div class="drawer-stat-label">Current Month Margin ${currentM && currentM.is_projected ? '<span class="proj-label">projected</span>' : ''}</div>
      <div class="drawer-stat-value ${marginAccent(displayMargin)}" style="font-size:2rem">${displayMargin !== null ? displayMargin.toFixed(1) + '%' : '—'}</div>
      <div style="font-size:.78rem;color:var(--text3);margin-top:.2rem">Profit: ${displayProfit !== null ? '$' + fmt(displayProfit) : '—'}</div>
    </div>

    <div class="drawer-section-title">Monthly History</div>
    ${monthly.length ? monthly.map(m => `
      <div class="drawer-month-row">
        <div class="drawer-month-key">${m.monthKey}${m.is_projected ? '<span class="proj-label">proj</span>' : ''}</div>
        <div class="drawer-month-visits">${m.visit_count} visit${m.visit_count !== 1 ? 's' : ''}</div>
        <div class="drawer-month-margin ${marginAccent(m.projected_margin)}">${m.projected_margin.toFixed(1)}%</div>
        <div class="drawer-month-margin muted" style="font-size:.8rem">$${fmt(m.projected_profit)}</div>
      </div>
    `).join('') : '<div class="muted" style="font-size:.82rem;padding:.5rem 0">No monthly data yet</div>'}

    <div class="drawer-section-title" style="margin-top:1.5rem">Margin Trend</div>
    <div class="drawer-chart-wrap"><canvas id="drawer-trend-chart"></canvas></div>
  `;

  // Render trend chart
  if (pool.monthly && pool.monthly.length > 1) {
    const sorted = pool.monthly.slice().sort((a, b) => a.monthKey.localeCompare(b.monthKey));
    const ctx = document.getElementById('drawer-trend-chart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: sorted.map(m => m.monthKey),
        datasets: [{
          data: sorted.map(m => m.projected_margin),
          borderColor: '#2aa89a',
          backgroundColor: 'rgba(42,168,154,0.1)',
          borderWidth: 2,
          pointBackgroundColor: sorted.map(m => m.is_projected ? '#c8a84b' : '#2aa89a'),
          pointRadius: 5,
          tension: 0.3,
          fill: true,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#4d7874', font: { family: 'Barlow Condensed', size: 10 } }, grid: { display: false } },
          y: { ticks: { color: '#4d7874', font: { family: 'Barlow Condensed', size: 10 }, callback: v => v.toFixed(0) + '%' }, grid: { color: 'rgba(42,168,154,0.06)' } },
        },
      },
    });
  }

  document.getElementById('drawer-backdrop').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer-backdrop').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined) return '—';
  const abs = Math.abs(n);
  const str = abs >= 1000 ? (abs/1000).toFixed(1) + 'k' : abs.toFixed(0);
  return (n < 0 ? '-' : '') + str;
}

function marginAccent(m) {
  if (m === null || m === undefined) return 'muted';
  if (m >= 60) return 'good';
  if (m >= 30) return 'warn';
  return 'bad';
}

function marginLabel(m) {
  if (m >= 60) return 'Strong — keep it up';
  if (m >= 30) return 'Healthy — room to grow';
  if (m >= 0)  return 'Low — review chem spend';
  return 'Negative — losing money';
}
</script>
</body>
</html>
