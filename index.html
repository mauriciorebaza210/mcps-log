<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MCPS Log App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a7a6e;
            --primary-hover: #155f55;
            --teal-dark: #0d4d44;
            --teal-mid: #1a7a6e;
            --teal-light: #2aa89a;
            --gold: #c8a84b;
            --gold-light: #e8c96a;
            --bg-color: #f0fdf4;
            --card-bg: rgba(255, 255, 255, 0.97);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #e0f2f0 0%, #d1ece8 40%, #dcfce7 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-top: 1rem;
        }

        .header-logo {
            max-height: 100px;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
        }

        .header-wordmark {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            margin-top: 0.25rem;
        }

        .header-mission {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: var(--teal-dark);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            line-height: 1;
        }

        .header-sub {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--teal-mid);
            letter-spacing: 0.28em;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            box-shadow: 0 10px 40px -10px rgba(13, 77, 68, 0.12);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
            display: none;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 1.25rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
            color: var(--teal-dark);
        }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .help-text {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            margin-top: -0.2rem;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background: #f8fafc;
            color: var(--text-main);
        }

        textarea { resize: vertical; min-height: 80px; }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--teal-mid);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(26, 122, 110, 0.15);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .checkbox-group input { width: auto; }

        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(26, 122, 110, 0.2);
            border-radius: 50%;
            border-top-color: var(--teal-mid);
            animation: spin 1s ease-in-out infinite;
            margin: 4rem auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .center-content { text-align: center; }

        .calc-box {
            background: #e8f5f3;
            border: 1px dashed var(--teal-mid);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .calc-list {
            margin-top: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .calc-item {
            background: #fff;
            padding: 0.75rem;
            border-radius: 8px;
            border-left: 4px solid var(--warning);
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .calc-item.good { border-left-color: var(--success); }
        .calc-item.bad  { border-left-color: var(--error); }

        .calc-amount { font-weight: 700; font-size: 1.1rem; }

        .btn-submit {
            width: 100%;
            padding: 1.25rem;
            background: var(--teal-dark);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Oswald', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(13, 77, 68, 0.25);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: var(--teal-mid);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 77, 68, 0.3);
        }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #gallons-wrapper { display: none; }
    </style>
</head>

            <div class="header-wordmark">
                <span class="header-mission">Mission</span>
                <span class="header-sub">Custom Pool Solutions</span>
            </div>
        </header>

        <div id="loader-area" class="center-content">
            <div class="loader"></div>
            <p style="color:var(--text-muted); font-weight:500;">Loading form...</p>
        </div>

        <div id="form-container"></div>
    </div>

    <script>
        let _formItems = [];

        const TEST_FIELDS = {
            FC: "Chlorine (Cl)",
            PH: "pH",
            TA: "Total Alkalinity (TA)",
            CH: "Calcium Hardness (CH)"
        };

        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcCh5WVhiCZglMFQ_BaHHRD_QbsOFzpf5KgKyFWReAv7aJp2Z6_oYIUYBMLwzTIy_v/exec';

        window.onload = () => {
            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ secret: 'mcps_webhook_2026', action: 'get_metadata' })
            })
            .then(r => r.json())
            .then(res => {
                if (res.ok) renderForm(res.data);
                else alert("Error loading form: " + res.error);
            })
            .catch(err => alert("Network error: " + err));
        };

        function renderForm(metadata) {
            document.getElementById('loader-area').style.display = 'none';
            _formItems = metadata;
            const container = document.getElementById('form-container');
            let currentCard = null;

            const createCard = (title) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.style.display = 'block';
                if (title) {
                    const h2 = document.createElement('h2');
                    h2.className = 'section-title';
                    h2.innerText = title;
                    div.appendChild(h2);
                }
                return div;
            };

            currentCard = createCard("Visit Details");
            container.appendChild(currentCard);

            metadata.forEach(item => {
                if (item.isSectionBreak) {
                    currentCard = createCard(item.title || "Chemical Summary");
                    container.appendChild(currentCard);

                    if (item.title && item.title.trim().toLowerCase() === "used") {
                        const calcDiv = document.createElement('div');
                        calcDiv.id = "live-calc-box";
                        calcDiv.className = "calc-box";
                        calcDiv.innerHTML = `
                            <div style="font-weight:700; color:var(--teal-dark); margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center;">
                                <span>Calculated Additions</span>
                                <span id="calc-vol-display" style="font-size:0.8rem; background:rgba(255,255,255,0.7); padding:2px 8px; border-radius:10px;">Vol: 10K Gal</span>
                            </div>
                            <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.5rem;">Based on 10k gallons default (adjust via Volume field above).</div>
                            <div id="calc-items" class="calc-list"></div>
                        `;
                        currentCard.appendChild(calcDiv);
                    }
                    return;
                }

                const group = document.createElement('div');
                group.className = 'form-group';

                let labelStr = item.title;
                if (item.isRequired) labelStr += " <span style='color:red;'>*</span>";
                group.innerHTML = `<label>${labelStr}</label>`;
                if (item.helpText) {
                    group.innerHTML += `<div class="help-text">${item.helpText}</div>`;
                }

                const titleEscaped = item.title.replace(/"/g, '&quot;');
                let inputHtml = '';

                if (item.type === 'LIST' || item.type === 'MULTIPLE_CHOICE') {
                    inputHtml = `<select name="${titleEscaped}" ${item.isRequired ? 'required' : ''}>
                        <option value="">Select option...</option>
                        ${item.choices.map(c => `<option value="${c.replace(/"/g, '&quot;')}">${c}</option>`).join('')}
                    </select>`;
                } else if (item.type === 'CHECKBOX') {
                    inputHtml = item.choices.map(c => `
                        <label class="checkbox-group">
                            <input type="checkbox" name="${titleEscaped}" value="${c.replace(/"/g, '&quot;')}">
                            <span style="font-weight:400;">${c}</span>
                        </label>
                    `).join('');
                } else if (item.type === 'PARAGRAPH_TEXT') {
                    inputHtml = `<textarea name="${titleEscaped}" ${item.isRequired ? 'required' : ''}></textarea>`;
                } else {
                    const isNumber = Object.values(TEST_FIELDS).includes(item.title) || (item.helpText && item.helpText.toLowerCase().includes('quantity'));
                    inputHtml = `<input type="${isNumber ? 'number' : 'text'}" step="any" name="${titleEscaped}" ${item.isRequired ? 'required' : ''} oninput="runRecs()">`;
                }

                group.innerHTML += inputHtml;
                currentCard.appendChild(group);

                if (item.title && item.title.trim().toLowerCase() === "pool_id") {
                    const volGroup = document.createElement('div');
                    volGroup.className = 'form-group';
                    volGroup.innerHTML = `
                        <label>Estimated Pool Volume (Gallons)</label>
                        <div class="help-text">Used solely for calculating exact dosages below.</div>
                        <input type="number" id="custom_vol" value="10000" oninput="runRecs()">
                    `;
                    currentCard.appendChild(volGroup);
                }
            });

            const btnWrapper = document.createElement('div');
            btnWrapper.className = 'card';
            btnWrapper.style.display = 'block';
            btnWrapper.style.background = 'transparent';
            btnWrapper.style.boxShadow = 'none';
            btnWrapper.style.border = 'none';
            btnWrapper.style.padding = '0';
            btnWrapper.innerHTML = `<button type="button" class="btn-submit" id="btn-submit" onclick="submitForm()">Submit Log to MCPS</button>`;
            container.appendChild(btnWrapper);
        }

        function getValByTitle(title) {
            const el = document.querySelector(`[name="${title}"]`);
            if (!el || !el.value) return null;
            const v = parseFloat(el.value);
            return isNaN(v) ? null : v;
        }

        function runRecs() {
            const fc = getValByTitle(TEST_FIELDS.FC);
            const ph = getValByTitle(TEST_FIELDS.PH);
            const ta = getValByTitle(TEST_FIELDS.TA);
            const ch = getValByTitle(TEST_FIELDS.CH);

            const volEl = document.getElementById('custom_vol');
            let gallons = 10000;
            if (volEl && volEl.value) gallons = parseFloat(volEl.value) || 10000;

            const calcBox  = document.getElementById('live-calc-box');
            const calcList = document.getElementById('calc-items');
            const volDisplay = document.getElementById('calc-vol-display');

            if (!calcBox || !calcList) return;

            const results = [];
            volDisplay.innerText = `Vol: ${gallons.toLocaleString()} Gal`;

            let poolSize = "small";
            if (gallons > 15000 && gallons <= 20000) poolSize = "medium";
            else if (gallons > 20000) poolSize = "large";

            // 1. CHLORINE
            if (fc !== null) {
                if (poolSize === "small" || poolSize === "medium") {
                    if (fc <= 2) results.push({ name: 'Liquid Chlorine', status: 'bad',     amt: '2 gal', reason: 'FC low' });
                    else if (fc <= 4) results.push({ name: 'Liquid Chlorine', status: 'warning', amt: '1 gal', reason: 'FC maintaining' });
                } else {
                    if (fc <= 2) results.push({ name: 'Liquid Chlorine', status: 'bad',     amt: '3 gal', reason: 'FC low' });
                    else if (fc <= 4) results.push({ name: 'Liquid Chlorine', status: 'warning', amt: '2 gal', reason: 'FC maintaining' });
                }
            }

            // 2. PH (Muriatic Acid 31.45%)
            if (ph !== null) {
                if (ph >= 7.6) {
                    let drop_needed = ph - 7.4;
                    let dropRate = 0.15;
                    if (ta !== null) {
                        if (ta < 90)  dropRate = 0.20;
                        else if (ta > 120) dropRate = 0.10;
                    }
                    let quartsNeeded = (drop_needed / dropRate) * (gallons / 10000);
                    let galNeeded    = quartsNeeded / 4;
                    let maxGal       = 0.25 * (gallons / 10000);
                    let reasonStr    = 'Lower pH to 7.4 (factoring TA)';
                    if (galNeeded > maxGal) { galNeeded = maxGal; reasonStr = 'Max safe dose applied to avoid crash'; }
                    let flooredQuarters = Math.round(galNeeded * 4) / 4;
                    if (flooredQuarters < 0.25) flooredQuarters = 0.25;
                    let severity = ph >= 8.0 ? 'bad' : 'warning';
                    results.push({ name: 'Muriatic Acid', status: severity, amt: flooredQuarters.toFixed(2) + ' gal', reason: reasonStr });
                } else if (ph <= 7.0) {
                    results.push({ name: 'Soda Ash', status: 'bad', amt: 'As needed', reason: 'pH low' });
                }
            }

            // 3. ALKALINITY — Alkalinity Increaser (Sodium Bicarb)
            if (ta !== null && ta < 90) {
                let ppm_inc = 100 - ta;
                let lbs = 1.4 * (gallons / 10000) * (ppm_inc / 10);
                results.push({ name: 'Alkalinity Increaser (Sodium Bicarb)', status: 'warning', amt: lbs.toFixed(1) + ' lbs', reason: 'Raise TA to 100ppm' });
            }

            // 4. CALCIUM
            if (ch !== null && ch < 200) {
                let ppm_inc = 200 - ch;
                let lbs = 1.2 * (gallons / 10000) * (ppm_inc / 10);
                results.push({ name: 'Calcium Hardness Increaser', status: 'warning', amt: lbs.toFixed(1) + ' lbs', reason: 'Raise CH to 200ppm' });
            }

            if (results.length === 0) { calcBox.style.display = 'none'; return; }

            calcBox.style.display = 'block';
            calcList.innerHTML = results.map(r => `
                <div class="calc-item ${r.status}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:600">${r.name}</span>
                        <span class="calc-amount">${r.amt}</span>
                    </div>
                    ${r.reason ? `<div style="font-size:0.75rem; color:var(--text-muted);">↳ ${r.reason}</div>` : ''}
                </div>
            `).join('');
        }

        function submitForm() {
            const btn = document.getElementById('btn-submit');
            const payload = {};
            let hasError = false;

            _formItems.forEach(item => {
                if (!item.title) return;
                let val;
                if (item.type === 'CHECKBOX') {
                    const boxes = document.querySelectorAll(`input[name="${item.title.replace(/"/g, '&quot;')}"]:checked`);
                    val = Array.from(boxes).map(b => b.value);
                    if (val.length === 0) val = null;
                } else {
                    const el = document.querySelector(`[name="${item.title.replace(/"/g, '&quot;')}"]`);
                    if (el) val = el.value.trim();
                }
                if (item.isRequired && (!val || (Array.isArray(val) && val.length === 0))) hasError = true;
                if (val) payload[item.title] = val;
            });

            if (hasError) { alert("Please fill out all required fields marked with *"); return; }

            btn.disabled    = true;
            btn.innerText   = "Submitting...";

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ secret: 'mcps_webhook_2026', action: 'submit_form', data: payload })
            })
            .then(r => r.json())
            .then(res => {
                if (res.ok) {
                    document.body.innerHTML = `
                        <div style="text-align:center; padding:4rem 1rem; font-family:'Inter',sans-serif;">
                            <div style="font-size:4rem; margin-bottom:1rem;">✅</div>
                            <div style="font-family:'Oswald',sans-serif; font-size:2rem; font-weight:700; letter-spacing:0.1em; color:#0d4d44; margin-bottom:0.5rem;">SUBMITTED</div>
                            <p style="color:#64748b; font-size:1rem; margin-bottom:2rem;">Log written, inventory deducted, and email blasted.</p>
                            <button onclick="window.location.reload()" style="padding:1rem 2rem; background:#0d4d44; color:white; border:none; border-radius:12px; font-family:'Oswald',sans-serif; font-size:1.1rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;">
                                Log Another Pool
                            </button>
                        </div>`;
                } else {
                    alert("Error: " + res.error);
                    btn.disabled  = false;
                    btn.innerText = "Submit Log to MCPS";
                }
            })
            .catch(err => {
                alert("Network error: " + err);
                btn.disabled  = false;
                btn.innerText = "Submit Log to MCPS";
            });
        }
    </script>
</body>
</html>
