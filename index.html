<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCPS Log App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal-dark: #0d4d44;
  --teal-mid: #1a7a6e;
  --teal-light: #2aa89a;
  --gold: #c8a84b;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --border-color: #e2e8f0;
  --success: #16a34a;
  --error: #ef4444;
  --warning: #d97706;
}
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(160deg, #e0f2f0 0%, #d1ece8 40%, #dcfce7 100%);
  color: var(--text-main);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 1rem;
}
.container { width: 100%; max-width: 600px; margin-bottom: 2rem; }
header { text-align: center; margin-bottom: 1.5rem; padding-top: 1rem; }
.header-logo { max-height: 100px; margin-bottom: 0.5rem; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15)); }
.header-mission { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 2rem; color: var(--teal-dark); letter-spacing: 0.12em; text-transform: uppercase; line-height: 1; }
.header-sub { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 0.95rem; color: var(--teal-mid); letter-spacing: 0.28em; text-transform: uppercase; }

.card {
  background: rgba(255,255,255,0.97);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 20px;
  box-shadow: 0 10px 40px -10px rgba(13,77,68,0.12);
  padding: 1.5rem; margin-bottom: 1.5rem;
  display: none; animation: slideUp 0.5s ease;
}
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-top: 0; margin-bottom: 1.25rem;
  border-bottom: 2px solid var(--border-color);
  padding-bottom: 0.5rem; color: var(--teal-dark);
}
.form-group { margin-bottom: 1.25rem; }
label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.95rem; }
.help-text { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; margin-top: -0.2rem; }

input[type="text"], input[type="number"], select, textarea {
  width: 100%; padding: 0.75rem 1rem;
  border: 1px solid var(--border-color); border-radius: 12px;
  font-size: 1rem; font-family: 'Inter', sans-serif;
  box-sizing: border-box; transition: all 0.2s;
  background: #f8fafc; color: var(--text-main);
}
textarea { resize: vertical; min-height: 80px; }
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--teal-mid);
  background: #fff; box-shadow: 0 0 0 3px rgba(26,122,110,0.15);
}
.checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.checkbox-group input { width: auto; }

.loader {
  display: inline-block; width: 40px; height: 40px;
  border: 4px solid rgba(26,122,110,0.2);
  border-radius: 50%; border-top-color: var(--teal-mid);
  animation: spin 1s ease-in-out infinite; margin: 4rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.center-content { text-align: center; }

/* Recommendation box */
.rec-box {
  background: #e8f5f3; border: 1px dashed var(--teal-mid);
  border-radius: 14px; padding: 1rem 1.1rem;
  margin-bottom: 1.5rem; display: none;
}
.rec-box-header {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 0.82rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--teal-dark);
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 0.6rem;
}
.rec-vol-badge {
  font-size: 0.72rem; background: rgba(255,255,255,0.8);
  padding: 2px 9px; border-radius: 10px;
  color: var(--teal-mid); font-weight: 600;
}
.rec-flags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.7rem; }
.rec-flag {
  font-size: 0.7rem; font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 5px;
}
.rec-flag.summer { background: rgba(217,119,6,0.15); color: var(--warning); }
.rec-flag.green  { background: rgba(239,68,68,0.12); color: var(--error); }
.rec-flag.fiber  { background: rgba(26,122,110,0.12); color: var(--teal-mid); }
.rec-flag.plstr  { background: rgba(200,168,75,0.15); color: var(--gold); }

.rec-list { display: flex; flex-direction: column; gap: 0.55rem; }
.rec-item {
  background: #fff; padding: 0.75rem 0.9rem;
  border-radius: 10px; display: flex; flex-direction: column; gap: 0.2rem;
}
.rec-item.bad     { border-left: 4px solid var(--error); }
.rec-item.warning { border-left: 4px solid var(--warning); }
.rec-item.good    { border-left: 4px solid var(--success); }
.rec-item-top { display: flex; justify-content: space-between; align-items: center; }
.rec-item-name { font-weight: 600; font-size: 0.92rem; }
.rec-item-amt  { font-family: 'Oswald', sans-serif; font-size: 1.05rem; font-weight: 600; color: var(--teal-dark); }
.rec-item-reason { font-size: 0.75rem; color: var(--text-muted); }

.btn-submit {
  width: 100%; padding: 1.25rem;
  background: var(--teal-dark); color: white; border: none;
  border-radius: 12px;
  font-family: 'Oswald', sans-serif; font-weight: 600;
  font-size: 1.2rem; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(13,77,68,0.25); margin-top: 1rem;
}
.btn-submit:hover { background: var(--teal-mid); transform: translateY(-2px); }
.btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

/* Pool condition pills */
.condition-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.4rem; }
.condition-pill {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.82rem; font-weight: 600; letter-spacing: 0.05em;
  padding: 0.3rem 0.85rem; border-radius: 99px; cursor: pointer;
  border: 1.5px solid var(--border-color);
  background: #f8fafc; color: var(--text-muted);
  transition: all 0.15s; user-select: none;
}
.condition-pill.active { border-color: var(--error); background: #fef2f2; color: var(--error); }
.condition-pill.active-ok { border-color: var(--success); background: #f0fdf4; color: var(--success); }
</style>
</head>
<body>
<div class="container">
  <header>
    <img class="header-logo" src="https://missioncustompools.com/wp-content/uploads/2024/07/mission-custom-pools-logo.webp" alt="Mission Custom Pool Solutions">
    <div><span class="header-mission">Mission</span></div>
    <div><span class="header-sub">Custom Pool Solutions</span></div>
  </header>

  <div id="loader-area" class="center-content">
    <div class="loader"></div>
    <p style="color:var(--text-muted);font-weight:500;">Loading form...</p>
  </div>

  <div id="form-container"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// MCPS RECOMMENDATION ENGINE v2
// Logic built from 7-year ops head field knowledge, San Antonio conditions.
// Targets: FC 3-5, pH 7.2-7.6, TA 80-120, CH 250-350
// ══════════════════════════════════════════════════════════════════════════════

const SIZE_GALLONS   = { small: 12000, medium: 17500, large: 25000 };
const SUMMER_MONTHS  = [6, 7, 8, 9]; // June-Sept San Antonio heat

const TEST_FIELDS = {
  FC: "Chlorine (Cl)",
  PH: "pH",
  TA: "Total Alkalinity (TA)",
  CH: "Calcium Hardness (CH)"
};

function sizeToGallons(poolDropdownValue) {
  const s = String(poolDropdownValue || "").toLowerCase();
  if (s.includes("large")  || s.includes(">20") || s.includes("20,000")) return SIZE_GALLONS.large;
  if (s.includes("medium") || s.includes("15,000")) return SIZE_GALLONS.medium;
  return SIZE_GALLONS.small;
}

function getPoolMaterial() {
  const el = document.getElementById("pool-material-select");
  return el ? el.value : "plaster";
}

function getIsGreen() {
  const pill = document.querySelector(".condition-pill.active");
  if (pill) return true;
  const notes = document.querySelector('[name="Notes"]');
  return notes ? /green|algae|cloudy|murky/i.test(notes.value) : false;
}

function buildRecs(fc, ph, ta, ch, gallons, material, isGreen) {
  const results  = [];
  const isSummer = SUMMER_MONTHS.includes(new Date().getMonth() + 1);
  const gal10k   = gallons / 10000;

  // ── 1. LIQUID CHLORINE ────────────────────────────────────────────────────
  if (fc !== null) {
    let baseGal = 1.0 * gal10k;         // 1 gal per 10k = standard maintenance
    if (isSummer) baseGal *= 1.5;        // +50% June-Sept (heat burns chlorine faster)

    if (isGreen) {
      // Algae protocol: double dose, chemistry after
      results.push({
        name: "Liquid Chlorine", status: "bad",
        amt: (baseGal * 2).toFixed(1) + " gal",
        reason: "Green/algae pool — shock dose. Do NOT adjust pH/TA/CH until chlorine works (24-48 hrs)."
      });
    } else if (fc < 2) {
      // Critically low: 2x
      results.push({
        name: "Liquid Chlorine", status: "bad",
        amt: (baseGal * 2).toFixed(1) + " gal",
        reason: "FC critically low (below 2 ppm) — double dose" + (isSummer ? " + summer ×1.5" : "")
      });
    } else if (fc < 3) {
      // Below target (3-5): add normal dose
      results.push({
        name: "Liquid Chlorine", status: "warning",
        amt: baseGal.toFixed(1) + " gal",
        reason: "FC below target (3-5 ppm)" + (isSummer ? " + summer ×1.5" : "")
      });
    } else if (fc <= 5) {
      // In range: still dose maintenance to hold through the week
      results.push({
        name: "Liquid Chlorine", status: "good",
        amt: baseGal.toFixed(1) + " gal",
        reason: "FC in range — maintenance dose to hold through week" + (isSummer ? " (summer ×1.5)" : "")
      });
    }
    // FC > 5: no chlorine recommendation
  }

  // ── 2. MURIATIC ACID (pH) ─────────────────────────────────────────────────
  if (ph !== null) {
    if (isGreen && ph > 7.6) {
      // Green pool: acknowledge but defer acid
      results.push({
        name: "Muriatic Acid", status: "warning",
        amt: "Hold — after shock",
        reason: "pH high but pool is green. Shock chlorine first, adjust pH after 24-48 hrs."
      });
    } else if (ph > 7.6) {
      // Standard dose: 0.5 gal per 10k (ops head confirmed)
      // One dose max per visit, no split dosing
      let acidGal = 0.5 * gal10k;
      if (material === "fiberglass") acidGal *= 0.75; // gentler on fiberglass
      acidGal = Math.min(acidGal, 1.0 * gal10k);     // never exceed 1 gal/10k
      acidGal = Math.max(Math.round(acidGal * 4) / 4, 0.25); // round to nearest 0.25 gal
      const fiberNote = material === "fiberglass" ? " (reduced — fiberglass surface is sensitive)" : "";
      results.push({
        name: "Muriatic Acid", status: ph >= 8.0 ? "bad" : "warning",
        amt: acidGal.toFixed(2) + " gal",
        reason: "Lower pH to 7.2-7.6. One dose max per visit — never split." + fiberNote
      });
    } else if (ph < 7.2) {
      results.push({
        name: "Soda Ash", status: "bad",
        amt: "As needed",
        reason: "pH below 7.2 — raise carefully. Test again before adding more."
      });
    }
  }

  // ── 3. ALKALINITY INCREASER (Sodium Bicarb) ───────────────────────────────
  // Skip if green — chlorine must work before balancing TA
  if (ta !== null && !isGreen) {
    if (ta < 80) {
      const ppmNeeded = 100 - ta; // target 100 ppm midpoint of 80-120
      const lbs = (1.4 * gal10k * (ppmNeeded / 10)).toFixed(1);
      results.push({
        name: "Alkalinity Increaser (Sodium Bicarb)", status: "warning",
        amt: lbs + " lbs",
        reason: "Raise TA to 100 ppm (target 80-120 ppm)"
      });
    }
    // TA 80-120: in range, no action
    // TA > 120: let acid additions bring it down naturally — no bicarb needed
  }

  // ── 4. CALCIUM HARDNESS INCREASER ────────────────────────────────────────
  // Skip if green
  if (ch !== null && !isGreen) {
    if (ch < 250) {
      const ppmNeeded = 300 - ch; // target 300 midpoint of 250-350
      const lbs = (1.2 * gal10k * (ppmNeeded / 10)).toFixed(1);
      const plasterNote = material === "plaster"
        ? " Keep CH toward upper range for plaster surfaces." : "";
      results.push({
        name: "Calcium Hardness Increaser", status: "warning",
        amt: lbs + " lbs",
        reason: "Raise CH to 300 ppm (target 250-350 ppm)." + plasterNote
      });
    }
    if (ch > 450) {
      // SA hard water — very common
      results.push({
        name: "Calcium (Very High)", status: "warning",
        amt: "Partial drain",
        reason: "CH above 450 — consider partial drain + refill. Common in SA hard water areas."
      });
    }
  }

  // ── 5. ALGAE PROTOCOL BANNER ──────────────────────────────────────────────
  if (isGreen) {
    results.unshift({
      name: "ALGAE PROTOCOL", status: "bad",
      amt: "Shock first",
      reason: "Brush walls & floor. Shock with double chlorine. Wait 24-48 hrs before adjusting pH, TA, or CH."
    });
  }

  return results;
}

// ══════════════════════════════════════════════════════════════════════════════
// FORM MACHINERY
// ══════════════════════════════════════════════════════════════════════════════

let _formItems = [];
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcCh5WVhiCZglMFQ_BaHHRD_QbsOFzpf5KgKyFWReAv7aJp2Z6_oYIUYBMLwzTIy_v/exec';

window.onload = () => {
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ secret: 'mcps_webhook_2026', action: 'get_metadata' })
  })
  .then(r => r.json())
  .then(res => {
    if (res.ok) renderForm(res.data);
    else alert("Error loading form: " + res.error);
  })
  .catch(err => alert("Network error: " + err));
};

function renderForm(metadata) {
  document.getElementById('loader-area').style.display = 'none';
  _formItems = metadata;
  const container = document.getElementById('form-container');
  let currentCard = null;

  const createCard = (title) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.display = 'block';
    if (title) {
      const h2 = document.createElement('h2');
      h2.className = 'section-title';
      h2.innerText = title;
      div.appendChild(h2);
    }
    return div;
  };

  currentCard = createCard("Visit Details");
  container.appendChild(currentCard);

  metadata.forEach(item => {
    if (item.isSectionBreak) {
      currentCard = createCard(item.title || "Chemical Log");
      container.appendChild(currentCard);

      if (item.title && item.title.trim().toLowerCase() === "used") {
        const recDiv = document.createElement('div');
        recDiv.id = 'rec-box';
        recDiv.className = 'rec-box';
        recDiv.innerHTML =
          '<div class="rec-box-header">Calculated Additions<span id="rec-vol-badge" class="rec-vol-badge">—</span></div>' +
          '<div id="rec-flags" class="rec-flags"></div>' +
          '<div id="rec-list" class="rec-list"></div>';
        currentCard.appendChild(recDiv);
      }
      return;
    }

    const group = document.createElement('div');
    group.className = 'form-group';
    const labelStr = item.title + (item.isRequired ? " <span style='color:red'>*</span>" : "");
    group.innerHTML = '<label>' + labelStr + '</label>';
    if (item.helpText) group.innerHTML += '<div class="help-text">' + item.helpText + '</div>';

    const te = item.title.replace(/"/g, '&quot;');
    let inputHtml = '';

    if (item.type === 'LIST' || item.type === 'MULTIPLE_CHOICE') {
      inputHtml = '<select name="' + te + '" ' + (item.isRequired ? 'required' : '') + ' onchange="runRecs()">' +
        '<option value="">Select option...</option>' +
        item.choices.map(function(c) {
          return '<option value="' + c.replace(/"/g,'&quot;') + '">' + c + '</option>';
        }).join('') + '</select>';
    } else if (item.type === 'CHECKBOX') {
      inputHtml = item.choices.map(function(c) {
        return '<label class="checkbox-group"><input type="checkbox" name="' + te + '" value="' + c.replace(/"/g,'&quot;') + '" onchange="runRecs()"><span style="font-weight:400">' + c + '</span></label>';
      }).join('');
    } else if (item.type === 'PARAGRAPH_TEXT') {
      inputHtml = '<textarea name="' + te + '" ' + (item.isRequired ? 'required' : '') + ' oninput="runRecs()"></textarea>';
    } else {
      const isNum = Object.values(TEST_FIELDS).indexOf(item.title) !== -1 ||
        (item.helpText && item.helpText.toLowerCase().indexOf('quantity') !== -1);
      inputHtml = '<input type="' + (isNum ? 'number' : 'text') + '" step="any" name="' + te + '" ' + (item.isRequired ? 'required' : '') + ' oninput="runRecs()">';
    }

    group.innerHTML += inputHtml;
    currentCard.appendChild(group);

    // After pool_id: inject material selector + condition pills
    if (item.title && item.title.trim().toLowerCase() === 'pool_id') {
      const matGroup = document.createElement('div');
      matGroup.className = 'form-group';
      matGroup.innerHTML =
        '<label>Pool Material</label>' +
        '<div class="help-text">Affects acid dosing. Fiberglass gets a gentler dose.</div>' +
        '<select id="pool-material-select" onchange="runRecs()">' +
        '<option value="plaster">Plaster</option>' +
        '<option value="fiberglass">Fiberglass</option>' +
        '<option value="vinyl">Vinyl</option>' +
        '</select>';
      currentCard.appendChild(matGroup);

      const condGroup = document.createElement('div');
      condGroup.className = 'form-group';
      condGroup.innerHTML =
        '<label>Pool Condition on Arrival</label>' +
        '<div class="help-text">Tap if applicable — changes chlorine dosing protocol.</div>' +
        '<div class="condition-pills">' +
        '<div class="condition-pill" onclick="togglePill(this,false)" data-val="green">Green / Algae</div>' +
        '<div class="condition-pill" onclick="togglePill(this,false)" data-val="cloudy">Cloudy</div>' +
        '<div class="condition-pill" onclick="togglePill(this,true)" data-val="clear">Clear</div>' +
        '</div>';
      currentCard.appendChild(condGroup);
    }
  });

  const btnWrapper = document.createElement('div');
  btnWrapper.className = 'card';
  btnWrapper.style.cssText = 'display:block;background:transparent;box-shadow:none;border:none;padding:0;';
  btnWrapper.innerHTML = '<button type="button" class="btn-submit" id="btn-submit" onclick="submitForm()">Submit Log to MCPS</button>';
  container.appendChild(btnWrapper);
}

function togglePill(el, isOk) {
  const wasActive = el.classList.contains('active') || el.classList.contains('active-ok');
  document.querySelectorAll('.condition-pill').forEach(function(p) {
    p.classList.remove('active', 'active-ok');
  });
  if (!wasActive) el.classList.add(isOk ? 'active-ok' : 'active');
  runRecs();
}

function getNum(title) {
  const el = document.querySelector('[name="' + title + '"]');
  if (!el || !el.value) return null;
  const v = parseFloat(el.value);
  return isNaN(v) ? null : v;
}

function runRecs() {
  const fc = getNum(TEST_FIELDS.FC);
  const ph = getNum(TEST_FIELDS.PH);
  const ta = getNum(TEST_FIELDS.TA);
  const ch = getNum(TEST_FIELDS.CH);

  const poolEl = document.querySelector('[name="pool_id"]');
  const gallons = sizeToGallons(poolEl ? poolEl.value : "");
  const material = getPoolMaterial();
  const isGreen  = getIsGreen();
  const isSummer = SUMMER_MONTHS.indexOf(new Date().getMonth() + 1) !== -1;

  const recBox   = document.getElementById('rec-box');
  const recList  = document.getElementById('rec-list');
  const recFlags = document.getElementById('rec-flags');
  const volBadge = document.getElementById('rec-vol-badge');
  if (!recBox || !recList) return;

  if (fc === null && ph === null && ta === null && ch === null && !isGreen) {
    recBox.style.display = 'none';
    return;
  }

  const recs = buildRecs(fc, ph, ta, ch, gallons, material, isGreen);

  if (volBadge) volBadge.textContent = (gallons / 1000).toFixed(0) + 'K gal';

  const flags = [];
  if (isSummer) flags.push('<span class="rec-flag summer">Summer +50% Cl</span>');
  if (isGreen)  flags.push('<span class="rec-flag green">Algae Protocol Active</span>');
  if (material === 'fiberglass') flags.push('<span class="rec-flag fiber">Fiberglass — reduced acid</span>');
  if (material === 'plaster')    flags.push('<span class="rec-flag plstr">Plaster — watch CH</span>');
  recFlags.innerHTML = flags.join('');

  if (!recs.length) { recBox.style.display = 'none'; return; }

  recBox.style.display = 'block';
  recList.innerHTML = recs.map(function(r) {
    return '<div class="rec-item ' + r.status + '">' +
      '<div class="rec-item-top">' +
      '<span class="rec-item-name">' + r.name + '</span>' +
      '<span class="rec-item-amt">' + r.amt + '</span>' +
      '</div>' +
      '<div class="rec-item-reason">↳ ' + r.reason + '</div>' +
      '</div>';
  }).join('');
}

function submitForm() {
  const btn = document.getElementById('btn-submit');
  const payload = {};
  let hasError = false;

  _formItems.forEach(function(item) {
    if (!item.title) return;
    let val;
    if (item.type === 'CHECKBOX') {
      const boxes = document.querySelectorAll('input[name="' + item.title.replace(/"/g,'&quot;') + '"]:checked');
      val = Array.from(boxes).map(function(b) { return b.value; });
      if (!val.length) val = null;
    } else {
      const el = document.querySelector('[name="' + item.title.replace(/"/g,'&quot;') + '"]');
      if (el) val = el.value.trim();
    }
    if (item.isRequired && (!val || (Array.isArray(val) && !val.length))) hasError = true;
    if (val) payload[item.title] = val;
  });

  // Append pool condition to notes
  const activePill = document.querySelector('.condition-pill.active');
  if (activePill) {
    const cond = activePill.dataset.val;
    payload['Notes'] = ((payload['Notes'] || '') + ' [Condition on arrival: ' + cond + ']').trim();
  }

  if (hasError) { alert("Please fill out all required fields marked with *"); return; }

  btn.disabled = true;
  btn.innerText = "Submitting...";

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ secret: 'mcps_webhook_2026', action: 'submit_form', data: payload })
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.ok) {
      document.body.innerHTML =
        '<div style="text-align:center;padding:4rem 1rem;font-family:Inter,sans-serif;">' +
        '<div style="font-size:4rem;margin-bottom:1rem;">&#x2705;</div>' +
        '<div style="font-family:Oswald,sans-serif;font-size:2rem;font-weight:700;letter-spacing:0.1em;color:#0d4d44;margin-bottom:0.5rem;">SUBMITTED</div>' +
        '<p style="color:#64748b;font-size:1rem;margin-bottom:2rem;">Log written, inventory deducted, and email sent.</p>' +
        '<button onclick="window.location.reload()" style="padding:1rem 2rem;background:#0d4d44;color:white;border:none;border-radius:12px;font-family:Oswald,sans-serif;font-size:1.1rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Log Another Pool</button>' +
        '</div>';
    } else {
      alert("Error: " + res.error);
      btn.disabled = false;
      btn.innerText = "Submit Log to MCPS";
    }
  })
  .catch(function(err) {
    alert("Network error: " + err);
    btn.disabled = false;
    btn.innerText = "Submit Log to MCPS";
  });
}
</script>
